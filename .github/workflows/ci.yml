name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test

  smoke:
    name: smoke
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run designer-v2 smoke test
        run: npm run smoke

  a11y:
    name: a11y
    runs-on: ubuntu-latest
    needs: [unit-tests, smoke]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Lighthouse accessibility checks
        run: |
          npx --yes http-server docs -p 8080 >/tmp/http-server.log 2>&1 &
          SERVER_PID=$!
          cleanup() {
            kill "$SERVER_PID"
          }
          trap cleanup EXIT

          cat > lighthouserc.json <<'EOF'
          {
            "ci": {
              "collect": {
                "url": [
                  "http://127.0.0.1:8080/index.html",
                  "http://127.0.0.1:8080/designer.html",
                  "http://127.0.0.1:8080/designer-v2.html"
                ],
                "numberOfRuns": 1
              },
              "assert": {
                "assertions": {
                  "categories:accessibility": [
                    "error",
                    {
                      "minScore": 0.9
                    }
                  ]
                }
              }
            }
          }
          EOF

          npx --yes wait-on http://127.0.0.1:8080/index.html http://127.0.0.1:8080/designer.html http://127.0.0.1:8080/designer-v2.html
          npx --yes @lhci/cli@0.15.1 autorun --config=lighthouserc.json
