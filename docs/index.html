<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Learn and explore the Tsiolkovsky rocket equation with a simple calculator, explanations, and worked examples."
    />

    <title>Rocket Equation Calculator - Learn the Tsiolkovsky Equation</title>

    <link rel="stylesheet" href="./style.css" />
    <script type="module" src="./script.js"></script>
  </head>

  <body>
    <header>
      <h1 data-i18n="index.hero.title"></h1>
      <p data-i18n="index.hero.subtitle"></p>

      <nav aria-label="Primary" data-i18n="nav.primary" data-i18n-attr="aria-label">
        <div class="nav-row">
          <ul>
            <li><a href="./designer.html" data-i18n="nav.designer"></a></li>
            <li><a href="./compare.html" data-i18n="nav.compare"></a></li>
            <li><a href="#equation" data-i18n="nav.equation"></a></li>
            <li><a href="#explanation" data-i18n="nav.explanation"></a></li>
            <li><a href="#calculator" data-i18n="nav.calculator"></a></li>
            <li><a href="#worked-example" data-i18n="nav.worked_example"></a></li>
            <li><a href="#intuition" data-i18n="nav.intuition"></a></li>
          </ul>
          <div class="lang-switcher" data-i18n="nav.language_switcher" data-i18n-attr="aria-label">
            <button type="button" data-set-lang="en" data-i18n="lang.english"></button>
            <span class="lang-switcher-separator">|</span>
            <button type="button" data-set-lang="zh" data-i18n="lang.chinese"></button>
          </div>
        </div>
      </nav>
    </header>

    <main id="content">
      <section id="equation" aria-labelledby="equation-title">
        <h2 id="equation-title" data-i18n="index.equation.title"></h2>

        <p>
          <strong data-i18n="index.equation.plain_text_label"></strong>
          <code>Δv = v<sub>e</sub> ln(m<sub>0</sub>/m<sub>f</sub>)</code>
        </p>

        <figure aria-label="Tsiolkovsky rocket equation (MathML)">
          <math display="block">
            <mrow>
              <mo>Δ</mo><mi>v</mi>
              <mo>=</mo>
              <msub><mi>v</mi><mi>e</mi></msub>
              <mo>ln</mo>
              <mo>(</mo>
              <mfrac>
                <msub><mi>m</mi><mn>0</mn></msub>
                <msub><mi>m</mi><mi>f</mi></msub>
              </mfrac>
              <mo>)</mo>
            </mrow>
          </math>
          <figcaption data-i18n="index.equation.figcaption" data-i18n-html="true"></figcaption>
        </figure>
      </section>

      <section id="explanation" aria-labelledby="explanation-title">
        <h2 id="explanation-title" data-i18n="index.explanation.title"></h2>
        <p data-i18n="index.explanation.p1" data-i18n-html="true"></p>
        <p data-i18n="index.explanation.p2" data-i18n-html="true"></p>

        <h3 data-i18n="index.explanation.variables_title"></h3>
        <dl>
          <dt><strong data-i18n="index.explanation.dv_term"></strong></dt>
          <dd data-i18n="index.explanation.dv_desc" data-i18n-html="true"></dd>

          <dt><strong data-i18n="index.explanation.isp_term"></strong></dt>
          <dd data-i18n="index.explanation.isp_desc" data-i18n-html="true"></dd>

          <dt><strong data-i18n="index.explanation.g0_term" data-i18n-html="true"></strong></dt>
          <dd data-i18n="index.explanation.g0_desc" data-i18n-html="true"></dd>

          <dt><strong data-i18n="index.explanation.m0_term" data-i18n-html="true"></strong></dt>
          <dd data-i18n="index.explanation.m0_desc" data-i18n-html="true"></dd>

          <dt><strong data-i18n="index.explanation.mf_term" data-i18n-html="true"></strong></dt>
          <dd data-i18n="index.explanation.mf_desc" data-i18n-html="true"></dd>
        </dl>

        <p data-i18n="index.explanation.p3" data-i18n-html="true"></p>
      </section>

      <section id="calculator" aria-labelledby="calculator-title">
        <h2 id="calculator-title" data-i18n="index.calculator.title"></h2>

        <form id="dv-form" novalidate aria-describedby="calculator-note">
          <fieldset>
            <legend data-i18n="index.calculator.legend"></legend>

            <div class="form-grid">
              <div class="form-field">
                <label for="isp" data-i18n="index.calculator.isp_label" data-i18n-html="true"></label>
                <input
                  id="isp"
                  name="isp"
                  type="number"
                  inputmode="decimal"
                  min="0"
                  step="any"
                  required
                  autocomplete="off"
                />
              </div>

              <div class="form-field">
                <label for="m0" data-i18n="index.calculator.m0_label" data-i18n-html="true"></label>
                <input
                  id="m0"
                  name="m0"
                  type="number"
                  inputmode="decimal"
                  min="0"
                  step="any"
                  required
                  autocomplete="off"
                />
              </div>

              <div class="form-field">
                <label for="mf" data-i18n="index.calculator.mf_label" data-i18n-html="true"></label>
                <input
                  id="mf"
                  name="mf"
                  type="number"
                  inputmode="decimal"
                  min="0"
                  step="any"
                  required
                  autocomplete="off"
                />
              </div>
            </div>

            <div class="form-actions">
              <button type="submit" data-i18n="index.calculator.submit"></button>
              <p
                id="calculator-note"
                class="form-note"
                data-i18n="index.calculator.note"
                data-i18n-html="true"
              ></p>
            </div>

            <p id="calc-error" role="alert" aria-live="polite" hidden></p>
            <p id="calc-result" aria-live="polite" hidden></p>
          </fieldset>
        </form>
      </section>

      <section id="worked-example" aria-labelledby="worked-example-title">
        <h2 id="worked-example-title" data-i18n="index.example.title"></h2>

        <!--
          Falcon 9 Stage 1 worked example (ideal rocket-equation calculation).

          Sources / assumptions:
          - Masses: SpaceX Falcon 9 User's Guide PDF (Stage 1) lists ~433,100 kg (gross/wet) and
            ~25,600 kg (dry). Source: https://www.spacex.com/media/Falcon_9_User_Guide.pdf
          - Engine: Merlin 1D Isp is commonly cited as ~282 s at sea level and ~311 s in vacuum.
            We use the sea-level value here because Stage 1 begins its burn in the atmosphere.

          Notes:
          - This Δv is an ideal "speed budget" from the rocket equation (ignores gravity + drag
            losses and assumes constant performance). Real ascent to orbit requires more.
        -->

        <article class="example-card" aria-label="Worked example: Falcon 9 Stage 1">
          <h3 data-i18n="index.example.card_title"></h3>

          <div class="example-grid">
            <div class="example-kv">
              <p><strong data-i18n="index.example.inputs_title"></strong></p>
              <p data-i18n="index.example.inputs.isp" data-i18n-html="true"></p>
              <p data-i18n="index.example.inputs.m0" data-i18n-html="true"></p>
              <p data-i18n="index.example.inputs.mf" data-i18n-html="true"></p>
            </div>

            <div class="example-kv">
              <p><strong data-i18n="index.example.result_title"></strong></p>
              <p data-i18n="index.example.result_formula" data-i18n-html="true"></p>
              <p data-i18n="index.example.result_value" data-i18n-html="true"></p>
              <p class="muted" data-i18n="index.example.result_note"></p>
            </div>
          </div>

          <details>
            <summary data-i18n="index.example.details_summary"></summary>
            <ol>
              <li data-i18n="index.example.step_1" data-i18n-html="true"></li>
              <li data-i18n="index.example.step_2" data-i18n-html="true"></li>
              <li data-i18n="index.example.step_3" data-i18n-html="true"></li>
            </ol>
          </details>

          <p data-i18n="index.example.p1" data-i18n-html="true"></p>
          <p data-i18n="index.example.p2" data-i18n-html="true"></p>

          <div class="example-actions">
            <button type="button" id="load-falcon9" data-i18n="index.example.action.load"></button>
            <span class="muted" data-i18n="index.example.action.hint"></span>
          </div>
        </article>
      </section>

      <section id="intuition" aria-labelledby="intuition-title">
        <h2 id="intuition-title" data-i18n="index.intuition.title"></h2>
        <p data-i18n="index.intuition.p1" data-i18n-html="true"></p>
        <p data-i18n="index.intuition.p2" data-i18n-html="true"></p>
      </section>
    </main>

    <footer>
      <small>
        <span data-i18n="index.footer.prefix" data-i18n-html="true"></span>
