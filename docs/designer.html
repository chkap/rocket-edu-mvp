<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Interactively design a multi-stage rocket, inspect per-stage delta-v and thrust-to-weight ratio, and see a velocity chart update live."
    />
    <title>Multi-stage Rocket Designer</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./designer.css" />
    <script type="module" src="./designer.js"></script>
  </head>
  <body>

    <main id="content">
      <div class="page-hero">
        <h1 data-i18n="designer.hero.title"></h1>
        <p data-i18n="designer.hero.subtitle"></p>
      </div>

      <section aria-labelledby="designer-intro-title">
        <h2 id="designer-intro-title" data-i18n="designer.intro.title"></h2>
        <p data-i18n="designer.intro.body"></p>
      </section>

      <section aria-labelledby="designer-controls-title">
        <div class="designer-toolbar">
          <div>
            <h2 id="designer-controls-title" data-i18n="designer.controls.title"></h2>
            <p class="muted" data-i18n="designer.controls.note"></p>
          </div>

          <div class="designer-toolbar-actions" aria-label="Stage count controls">
            <button type="button" id="remove-stage" data-i18n="designer.controls.remove_stage"></button>
            <p id="stage-count" class="stage-count" aria-live="polite">2 stages</p>
            <button type="button" id="add-stage" data-i18n="designer.controls.add_stage"></button>
          </div>
        </div>

        <form id="designer-form" novalidate>
          <p
            id="designer-error"
            class="callout callout-danger"
            role="alert"
            aria-live="polite"
            hidden
          ></p>
          <div id="stage-list" class="stage-list"></div>
        </form>
      </section>

      <section aria-labelledby="designer-results-title">
        <h2 id="designer-results-title" data-i18n="designer.summary.title"></h2>

        <div class="summary-grid">
          <article class="summary-card">
            <h3 data-i18n="designer.summary.total_dv"></h3>
            <p id="total-dv" class="summary-value" aria-live="polite">—</p>
          </article>

          <article class="summary-card">
            <h3 data-i18n="designer.summary.capability"></h3>
            <p id="capability-label" class="summary-value" aria-live="polite">—</p>
          </article>

          <article class="summary-card">
            <h3 data-i18n="designer.summary.chart_status"></h3>
            <p
              id="chart-status-summary"
              class="summary-value"
              aria-live="polite"
              data-i18n="designer.summary.ready"
            ></p>
          </article>
        </div>

        <p id="twr-warning" class="callout callout-warning" role="alert" aria-live="polite" hidden></p>
      </section>

      <section aria-labelledby="chart-title">
        <h2 id="chart-title" data-i18n="designer.chart.title"></h2>
        <p class="muted" data-i18n="designer.chart.note"></p>

        <figure class="chart-figure">
          <svg
            id="velocity-chart"
            class="velocity-chart"
            viewBox="0 0 720 420"
            role="img"
            aria-labelledby="chart-svg-title chart-svg-desc"
          >
            <title id="chart-svg-title" data-i18n="designer.chart.svg_title"></title>
            <desc id="chart-svg-desc" data-i18n="designer.chart.svg_desc"></desc>
          </svg>
          <figcaption id="chart-caption" data-i18n="designer.chart.figcaption"></figcaption>
        </figure>

        <p id="chart-error" class="callout callout-danger" aria-live="polite" hidden data-i18n="designer.chart.error"></p>
      </section>
    </main>

    <footer>
      <small>
        <span data-i18n="designer.footer.prefix" data-i18n-html="true"></span>
        <a href="./index.html" data-i18n="designer.footer.link"></a>
      </small>
    </footer>
  </body>
</html>
