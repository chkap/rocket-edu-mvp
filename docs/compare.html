<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Compare real launch vehicle stage data against rocket-equation calculations and try stage-by-stage what-if sliders."
    />
    <title>Launcher compare</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./designer.css" />
    <style>
      .compare-grid {
        display: grid;
        gap: 1rem;
      }

      .preset-select {
        max-width: 24rem;
      }

      select,
      input[type='range'] {
        width: 100%;
      }

      select {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.55rem 0.65rem;
        font-size: 1rem;
        background: var(--surface);
        color: var(--text);
      }

      .stage-slider {
        margin-top: 1rem;
      }

      .slider-row {
        display: grid;
        gap: 0.5rem;
        align-items: center;
      }

      .slider-row output {
        font-weight: 700;
      }

      .source-list {
        padding-left: 1.25rem;
        margin: 0.75rem 0 0;
      }

      .source-list li + li {
        margin-top: 0.35rem;
      }

      .note-list {
        padding-left: 1.25rem;
        margin: 0.5rem 0 0;
      }
    </style>
    <script type="module" src="./compare.js"></script>
  </head>
  <body>
    <header>
      <h1 data-i18n="compare.hero.title"></h1>
      <p data-i18n="compare.hero.subtitle"></p>

      <nav aria-label="Primary" data-i18n="nav.primary" data-i18n-attr="aria-label">
        <div class="nav-row">
          <ul>
            <li><a href="./index.html" data-i18n="nav.index"></a></li>
            <li><a href="./designer.html" data-i18n="nav.designer"></a></li>
            <li><a href="./compare.html" aria-current="page" data-i18n="nav.compare"></a></li>
          </ul>
          <div class="lang-switcher" data-i18n="nav.language_switcher" data-i18n-attr="aria-label">
            <button type="button" data-set-lang="en" data-i18n="lang.english"></button>
            <span class="lang-switcher-separator">|</span>
            <button type="button" data-set-lang="zh" data-i18n="lang.chinese"></button>
          </div>
        </div>
      </nav>
    </header>

    <main id="content" class="compare-grid">
      <section aria-labelledby="preset-title">
        <h2 id="preset-title" data-i18n="compare.preset.title"></h2>
        <div class="form-field preset-select">
          <label for="launcher-select" data-i18n="compare.preset.label"></label>
          <select id="launcher-select" name="launcher"></select>
        </div>
        <p id="availability-note" class="callout callout-warning" hidden></p>
        <p id="launcher-note" class="muted" aria-live="polite"></p>
      </section>

      <section aria-labelledby="compare-summary-title">
        <h2 id="compare-summary-title" data-i18n="compare.summary.title"></h2>
        <div class="summary-grid">
          <article class="summary-card">
            <h3 data-i18n="compare.summary.computed"></h3>
            <p id="computed-dv" class="summary-value" aria-live="polite">—</p>
          </article>
          <article class="summary-card">
            <h3 data-i18n="compare.summary.published"></h3>
            <p id="published-dv" class="summary-value" aria-live="polite">—</p>
            <p id="reference-orbit" class="muted"></p>
          </article>
          <article class="summary-card">
            <h3 data-i18n="compare.summary.delta_percent"></h3>
            <p id="delta-percent" class="summary-value" aria-live="polite">—</p>
          </article>
          <article class="summary-card">
            <h3 data-i18n="compare.summary.capability"></h3>
            <p id="capability-label" class="summary-value" aria-live="polite">—</p>
          </article>
        </div>
      </section>

      <section aria-labelledby="editor-title">
        <h2 id="editor-title" data-i18n="compare.editor.title"></h2>
        <p id="compare-error" class="callout callout-danger" role="alert" aria-live="polite" hidden></p>
        <form id="compare-form" novalidate>
          <div id="stage-list" class="stage-list"></div>
        </form>
      </section>

      <section aria-labelledby="source-title">
        <h2 id="source-title" data-i18n="compare.sources.title"></h2>
        <p class="muted" data-i18n="compare.sources.note"></p>
        <ul id="source-list" class="source-list"></ul>
      </section>
    </main>

    <footer>
      <small>
        <span data-i18n="compare.footer.prefix" data-i18n-html="true"></span>
        <a href="./designer.html" data-i18n="compare.footer.link"></a>
      </small>
    </footer>
  </body>
</html>
