<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Design a realistic multi-stage rocket with engine catalog presets, booster support, and mission analysis."
    />
    <title>Rocket Designer v2</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./designer-v2.css" />
    <script type="module" src="./designer-v2.js"></script>
  </head>
  <body>
    <header>
      <h1 data-i18n="designer_v2.hero.title"></h1>
      <p data-i18n="designer_v2.hero.subtitle"></p>

      <nav aria-label="Primary" data-i18n="nav.primary" data-i18n-attr="aria-label">
        <div class="nav-row">
          <ul>
            <li><a href="./index.html" data-i18n="nav.index"></a></li>
            <li><a href="./designer.html" data-i18n="nav.designer"></a></li>
            <li><a href="./compare.html" data-i18n="nav.compare"></a></li>
            <li><a href="./designer-v2.html" aria-current="page" data-i18n="nav.designer_v2"></a></li>
          </ul>
          <div class="nav-controls">
            <div class="theme-switcher">
              <span class="theme-switcher-label" data-i18n="theme.label"></span>
              <button type="button" class="theme-toggle" data-theme-toggle></button>
            </div>
            <div class="lang-switcher" data-i18n="nav.language_switcher" data-i18n-attr="aria-label">
              <button type="button" data-set-lang="en" data-i18n="lang.english"></button>
              <span class="lang-switcher-separator">|</span>
              <button type="button" data-set-lang="zh" data-i18n="lang.chinese"></button>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main id="content" class="designer-v2-layout">
      <div class="designer-v2-main">
        <section aria-labelledby="designer-v2-intro-title">
          <h2 id="designer-v2-intro-title" data-i18n="designer_v2.intro.title"></h2>
          <p data-i18n="designer_v2.intro.body"></p>
        </section>

        <section aria-labelledby="designer-v2-controls-title">
          <div class="designer-v2-toolbar">
            <div class="designer-v2-toolbar-copy">
              <h2 id="designer-v2-controls-title" data-i18n="designer_v2.controls.title"></h2>
              <p class="muted" data-i18n="designer_v2.controls.note"></p>
            </div>

            <div class="designer-v2-toolbar-actions">
              <div class="form-field designer-v2-preset-field">
                <label for="preset-select" data-i18n="designer_v2.controls.preset_label"></label>
                <p class="designer-v2-preset-copy muted" data-i18n="designer_v2.controls.preset_note"></p>
                <div
                  id="preset-quick-load"
                  class="designer-v2-preset-chips"
                  data-i18n="designer_v2.controls.featured_presets"
                  data-i18n-attr="aria-label"
                ></div>
                <select id="preset-select" name="preset"></select>
                <p id="preset-source" class="designer-v2-note"></p>
              </div>
              <div class="designer-v2-button-row">
                <button type="button" id="add-stage" data-i18n="designer_v2.controls.add_stage"></button>
                <button type="button" id="remove-stage" data-i18n="designer_v2.controls.remove_stage"></button>
              </div>
            </div>
          </div>

          <p id="catalog-status" class="designer-v2-status" aria-live="polite"></p>
          <p id="designer-v2-error" class="callout callout-danger" role="alert" aria-live="polite" hidden></p>

          <form id="designer-v2-form" novalidate>
            <div class="designer-v2-mission-panel">
              <div class="form-field designer-v2-mission-field">
                <label for="target-orbit-altitude" data-i18n="designer_v2.field.target_orbit_altitude"></label>
                <p class="designer-v2-preset-copy muted" data-i18n="designer_v2.controls.target_orbit_note"></p>
                <div
                  id="mission-quick-picks"
                  class="designer-v2-preset-chips"
                  data-i18n="designer_v2.controls.target_quick_picks"
                  data-i18n-attr="aria-label"
                ></div>
                <input
                  id="target-orbit-altitude"
                  type="number"
                  inputmode="numeric"
                  min="200"
                  max="100000"
                  step="10"
                />
                <p id="target-orbit-altitude-error" class="field-error" aria-live="polite"></p>
                <p id="mission-target-preview" class="designer-v2-note" aria-live="polite"></p>
              </div>
            </div>
            <div id="booster-slot"></div>
            <div id="stage-list" class="designer-v2-stage-list"></div>
          </form>
        </section>
      </div>

      <aside class="designer-v2-sidebar">
        <section class="designer-v2-summary-panel" aria-labelledby="designer-v2-summary-title">
          <div class="designer-v2-summary-header">
            <div>
              <h2 id="designer-v2-summary-title" data-i18n="designer_v2.summary.title"></h2>
              <p id="summary-status" class="muted" aria-live="polite"></p>
            </div>
            <button type="button" id="analyze-button" data-i18n="designer_v2.controls.analyze"></button>
          </div>

          <p class="designer-v2-total-label" data-i18n="designer_v2.summary.total_dv"></p>
          <p id="total-dv" class="designer-v2-total-value" aria-live="polite">—</p>

          <div class="designer-v2-verdict-row">
            <span class="designer-v2-summary-label" data-i18n="designer_v2.summary.verdict"></span>
            <span id="verdict-pill" class="designer-v2-verdict-pill" aria-live="polite">—</span>
          </div>

          <div class="designer-v2-target-row">
            <span class="designer-v2-summary-label" data-i18n="designer_v2.summary.target"></span>
            <span id="mission-target" class="designer-v2-target-copy">—</span>
          </div>

          <div class="designer-v2-target-row">
            <span class="designer-v2-summary-label" data-i18n="designer_v2.summary.booster_phase"></span>
            <span id="booster-phase" class="designer-v2-target-copy">—</span>
          </div>

          <div class="designer-v2-mission-bar-wrap">
            <h3 class="designer-v2-summary-subtitle" data-i18n="designer_v2.summary.marker_bar"></h3>
            <div id="mission-bar" class="designer-v2-mission-bar" aria-live="polite"></div>
          </div>

          <details id="verdict-explainer" class="designer-v2-explainer" hidden>
            <summary class="designer-v2-explainer-summary" data-i18n="designer_v2.summary.explainer_title"></summary>
            <div id="verdict-explainer-body" class="designer-v2-explainer-body"></div>
          </details>

          <div>
            <h3 class="designer-v2-summary-subtitle" data-i18n="designer_v2.summary.warnings"></h3>
            <ul id="warnings-list" class="designer-v2-warning-list"></ul>
          </div>
        </section>
      </aside>
    </main>

    <footer>
      <small>
        <span data-i18n="designer_v2.footer.prefix" data-i18n-html="true"></span>
        <a href="./compare.html" data-i18n="designer_v2.footer.link"></a>
      </small>
    </footer>
  </body>
</html>
